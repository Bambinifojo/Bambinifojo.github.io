<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>404 - Sayfa Bulunamadı | Bambinifojo</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg"/>
<script>
  // SPA Routing Support - Admin panel route'larını yakala (CSS'den önce çalışmalı)
  (function() {
    const path = window.location.pathname;
    
    // Admin panel route'larını kontrol et
    if (path.includes('/admin/')) {
      // Admin panel route'u - admin.html'e hash ile yönlendir
      const pathParts = path.split('/');
      const section = pathParts[pathParts.length - 1] || 'dashboard';
      // Hash-based routing kullan (GitHub Pages uyumlu)
      window.location.replace('/admin.html#' + section);
      return;
    }
    
    // Diğer bilinen route'lar için kontrol
    const knownRoutes = {
      '/admin-login': '/admin-login.html',
      '/contact': '/contact.html',
      '/task-cosmos': '/task-cosmos/',
      '/task-scanner': '/task-scanner/',
      '/task-cosmos/privacy-policy': '/task-cosmos/privacy-policy.html'
    };
    
    if (knownRoutes[path]) {
      window.location.replace(knownRoutes[path]);
      return;
    }
  })();
</script>
<link rel="stylesheet" href="styles.css"/>
<style>
  .error-page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--background-gradient, linear-gradient(135deg, #483d8b, #6a5acd, #9370db));
    padding: 2rem;
    text-align: center;
    color: white;
  }
  
  .error-content {
    max-width: 600px;
    animation: fadeInUp 0.6s ease-out;
  }
  
  .error-code {
    font-size: 8rem;
    font-weight: bold;
    margin: 0;
    background: linear-gradient(135deg, #fff, #e0e0e0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }
  
  .error-title {
    font-size: 2rem;
    margin: 1rem 0;
    font-weight: 600;
  }
  
  .error-message {
    font-size: 1.1rem;
    margin: 1rem 0 2rem;
    opacity: 0.9;
    line-height: 1.6;
  }
  
  .error-actions {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
  }
  
  .btn-home {
    display: inline-block;
    padding: 0.875rem 2rem;
    background: rgba(255, 255, 255, 0.2);
    color: white;
    text-decoration: none;
    border-radius: 50px;
    font-weight: 600;
    transition: all 0.3s ease;
    -webkit-backdrop-filter: blur(10px);
    backdrop-filter: blur(10px);
    border: 2px solid rgba(255, 255, 255, 0.3);
  }
  
  .btn-home:hover {
    background: rgba(255, 255, 255, 0.3);
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
  }
  
  @keyframes fadeInUp {
    from {
      opacity: 0;
      transform: translateY(30px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
  
  @media (max-width: 768px) {
    .error-code {
      font-size: 5rem;
    }
    
    .error-title {
      font-size: 1.5rem;
    }
    
    .error-message {
      font-size: 1rem;
    }
  }
</style>
</head>
<body>
<div class="error-page">
  <div class="error-content">
    <h1 class="error-code">404</h1>
    <h2 class="error-title">Sayfa Bulunamadı</h2>
    <p class="error-message">
      Aradığınız sayfa mevcut değil veya taşınmış olabilir.<br>
      Ana sayfaya dönerek devam edebilirsiniz.
    </p>
    <div class="error-actions">
      <a href="/" class="btn-home">🏠 Ana Sayfaya Dön</a>
      <a href="contact.html" class="btn-home">✉️ İletişim</a>
    </div>
  </div>
</div>
</body>
</html>
