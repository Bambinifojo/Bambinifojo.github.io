# GitHub Pages - Build ve deploy
# Build job "github-pages" adlı artifact üretmeli; deploy bu artifact'ı kullanır.

name: pages-build-deployment

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (validate)
        run: npm run build

      # node_modules deploy'a dahil etme; sadece site dosyalarını yükle
      - name: Remove node_modules before upload
        run: rm -rf node_modules

      # deploy-pages sadece upload-pages-artifact ile yüklenen artifact'ı kabul ediyor
      - name: Upload artifact (github-pages)
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
